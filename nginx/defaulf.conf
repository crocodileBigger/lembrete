server {
    listen 8000;
    server_name localhost;

    # 1. Roteamento para o Frontend (Vue)
    location / {
        proxy_pass http://vue-app:8081; # Nome do serviço no compose e porta interna
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Roteamento para a API (Spring Boot)
    # Exemplo: Qualquer requisição que comece com /api/ vai para o backend
    location /api/ {
        proxy_pass http://spring-app:8080/; # A barra no final remove o "/api" ao repassar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
