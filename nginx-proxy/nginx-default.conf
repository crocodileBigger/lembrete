events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # O bloco SERVER precisa ficar aqui dentro do HTTP
    server {
        listen 443 ssl;
        server_name localhost; # Alterado de localhost para o domínio real do certificado

        ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;

        # Opcional: Melhores práticas de cabeçalhos proxy para evitar problemas de rota
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Roteamento para o Frontend (Vue)
        location / {
            proxy_pass http://vue-app:80; 
        }

        # 2. Roteamento para a API (Spring Boot)
        # Nota: O proxy_pass com "/" no final REESCREVE a URL removendo o "/api/"
        # Se o Spring Boot espera receber "/api/usuarios", mude para: http://spring-app:8080 (sem a barra no final)
        location /api/ {
            proxy_pass http://spring-app:8080/; 
        }

        # 3. Health Check corrigido
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Opcional mas altamente recomendado: Redirecionar HTTP para HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
