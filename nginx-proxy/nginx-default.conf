server {
    listen 443 ssl;
    server_name localhost; 

    # Altere as linhas de certificado para apontar para o local gerado pelo seu script.
    # Exemplo comum para certificados autoassinados de desenvolvimento:
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

    # Cabeçalhos padrão para proxying
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Frontend (Vue)
    location / {
        proxy_pass http://vue-app:80; 
    }

    # API (Spring Boot)
    location /api/ {
        proxy_pass http://spring-app:8080/; 
    }

    # Health Check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# 2. Redirecionamento HTTP para HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}
