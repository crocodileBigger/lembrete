services:
  # 1. Gateway Central (Proxy Reverso)
  gateway-nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    ports:
      - "8000:8000"
    volumes:
      - /home/bigg/Documentos/sprint/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spring-app
      - vue-app
    networks:
      - app-network

  # 2. Frontend (Vue.js)
  vue-app:
    build: ./lembretes-vue
    container_name: vue-app
    networks:
      - app-network

  # 3. Backend (Spring Boot)
  spring-app:
    build: ./lembretes-Api
    container_name: spring-app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/lembretes
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - postgres-db
    networks:
      - app-network

  # 4. Banco de Dados
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: lembretes
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
